{% extends "base.html" %}

{% block title %}
ログイン
{% endblock %}

{% block content %}

<h2>ログイン</h2>

<form method="post">
    {% if error %}
        <p style="color:red;">{{ error }}</p>
    {% endif %}

    <div>
        <label>会社コード</label>
        <input type="text" name="company_code">
    </div>

    <div>
        <label>ユーザーID</label>
        <input type="text" name="username">
    </div>

    <div>
        <label>パスワード</label>
        <input type="password" name="password">
    </div>

    <button type="submit">ログイン</button>
</form>

{% endblock %}
